<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#694664;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4B334E;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)" rx="80"/>
  
  <!-- Medical Cross -->
  <g transform="translate(256, 256)">
    <rect x="-10" y="-60" width="20" height="120" fill="white" rx="10"/>
    <rect x="-60" y="-10" width="120" height="20" fill="white" rx="10"/>
  </g>
  
  <!-- Curonn Text -->
  <text x="256" y="350" font-family="Arial, sans-serif" font-size="80" font-weight="bold" 
        text-anchor="middle" fill="white">C</text>
